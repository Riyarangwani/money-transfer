<div class="auth-page">
    <div class="auth-card">
        <div class="auth-brand">
            <div class="brand-mark" aria-hidden="true">M</div>
            <div>
                <span class="brand-label">Enterprise Banking</span>
                <h1 class="auth-heading">Secure transfer login</h1>
            </div>
        </div>

        <p class="auth-copy">Sign in to manage transfers, monitor account activity, and redeem rewards through a secure enterprise dashboard.</p>

        <form (ngSubmit)="login()" class="auth-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    [(ngModel)]="username"
                    placeholder="Enter your username"
                    required
                />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    [(ngModel)]="password"
                    placeholder="Enter your password"
                    required
                />
            </div>

            <div class="status-message" *ngIf="errorMessage">
                {{ errorMessage }}
            </div>

            <button type="submit" class="btn-primary" [disabled]="isLoading">
                {{ isLoading ? 'Signing in...' : 'Sign in' }}
            </button>
        </form>

        <div class="auth-footer">
            <p>New to the organization?</p>
            <a routerLink="/create-account" class="btn-secondary">Create an account</a>
        </div>
    </div>
</div>
