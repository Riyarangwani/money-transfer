<div class="page-shell">
    <div class="page-card">
        <div class="page-header">
            <div>
                <h1 class="page-title">Transfer Money</h1>
                <p class="page-copy">Move funds securely to another account with confirmation and enterprise reporting.</p>
            </div>
            <a routerLink="/dashboard" class="btn-secondary btn-back">← Back to Dashboard</a>
        </div>

        <form (ngSubmit)="transfer()" class="form-panel">
            <div class="form-group">
                <label for="fromAccount">From account</label>
                <input type="text" id="fromAccount" [value]="fromAccountId" disabled class="input-disabled" />
            </div>

            <div class="form-group">
                <label for="toAccount">Recipient account ID *</label>
                <input type="text" id="toAccount" [(ngModel)]="toAccountIdInput" name="toAccount" placeholder="Recipient account ID" required />
            </div>

            <div class="form-group">
                <label for="amount">Amount *</label>
                <input type="number" id="amount" [(ngModel)]="amount" name="amount" placeholder="Enter amount" min="0.01" step="0.01" required />
            </div>

            <div class="status-message" *ngIf="errorMessage">{{ errorMessage }}</div>
            <div class="success-message" *ngIf="successMessage">{{ successMessage }}</div>

            <button type="submit" class="btn-primary" [disabled]="isLoading">{{ isLoading ? 'Processing transfer...' : 'Transfer Money' }}</button>
        </form>
    </div>
</div>
