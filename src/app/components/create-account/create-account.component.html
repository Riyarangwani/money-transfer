<div class="auth-page">
    <div class="auth-card">
        <div class="auth-brand">
            <div class="brand-mark" aria-hidden="true">A</div>
            <div>
                <span class="brand-label">Enterprise Banking</span>
                <h1 class="auth-heading">Open a new account</h1>
            </div>
        </div>

        <p class="auth-copy">Create your enterprise account to begin secure transfers and gain access to reward tracking.</p>

        <form (ngSubmit)="createAccount()" class="auth-form">
            <div class="form-group">
                <label for="username">Username *</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    [(ngModel)]="username"
                    placeholder="Choose a unique username"
                    required
                />
            </div>

            <div class="form-group">
                <label for="password">Password *</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    [(ngModel)]="password"
                    placeholder="Create a strong password"
                    required
                />
            </div>

            <div class="form-group">
                <label for="holderName">Full name *</label>
                <input
                    type="text"
                    id="holderName"
                    name="holderName"
                    [(ngModel)]="holderName"
                    placeholder="Enter your full name"
                    required
                />
            </div>

            <div class="form-group">
                <label for="initialBalance">Initial balance</label>
                <input
                    type="number"
                    id="initialBalance"
                    name="initialBalance"
                    [(ngModel)]="initialBalance"
                    placeholder="Enter initial balance"
                    min="0"
                    step="0.01"
                    inputmode="decimal"
                />
            </div>

            <div class="status-message" *ngIf="errorMessage">
                {{ errorMessage }}
            </div>

            <div class="success-message" *ngIf="successMessage">
                {{ successMessage }}
            </div>

            <button type="submit" class="btn-primary" [disabled]="isLoading">
                {{ isLoading ? 'Creating account...' : 'Create account' }}
            </button>
        </form>

        <div class="auth-footer">
            <p>Already registered?</p>
            <a routerLink="/login" class="btn-secondary">Sign in</a>
        </div>
    </div>
</div>
